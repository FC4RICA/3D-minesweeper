services:
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    profiles: ["dev"]

  app-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    profiles: ["test"]

  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    ports:
      - "80:80"
    profiles: ["prod"]