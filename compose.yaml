services:
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    profiles: ["dev"]

  app-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    profiles: ["test"]

  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    ports:
      - "80:80"
    profiles: ["prod"]